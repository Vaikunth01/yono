<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .sbi-gradient { background: linear-gradient(180deg, #c2185b 0%, #6a329f 100%); }
        /* Enables scrolling for the list while keeping header fixed */
        .scroll-area {
            height: calc(100vh - 220px);
            overflow-y: auto;
        }
        .scroll-area::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-white max-w-md mx-auto flex flex-col h-screen overflow-hidden">

    <header class="sbi-gradient text-white p-6 pb-12 shrink-0">
        <div class="flex justify-between items-center mb-6">
            <i class="fas fa-arrow-left" onclick="history.back()"></i>
            <span class="font-bold">Transactions</span>
            <i class="fas fa-question-circle"></i>
        </div>
        <div class="flex justify-between items-center">
            <div>
                <p class="text-[10px] opacity-80">Savings Account</p>
                <p class="text-lg font-bold">xxxxxxx269 <i class="far fa-eye-slash text-xs ml-1"></i></p>
            </div>
            <div class="text-right">
                <p class="text-[10px] opacity-80">Available Balance</p>
                <p class="text-xl font-bold">₹5,090.67</p>
            </div>
        </div>
    </header>

    <main class="bg-white -mt-8 rounded-t-[35px] p-5 flex-1 flex flex-col">
        <div class="flex space-x-2 mb-6 shrink-0">
            <div class="flex-1 bg-gray-100 rounded-xl flex items-center px-4 py-3">
                <i class="fas fa-search text-gray-400 mr-2"></i>
                <input type="text" placeholder="Search" class="bg-transparent outline-none text-sm w-full">
            </div>
            <button class="bg-gray-100 p-3 rounded-xl text-gray-600"><i class="fas fa-sliders-h"></i></button>
        </div>

        <div class="scroll-area space-y-6 pb-24" id="txn-list">
            </div>
    </main>

    <script>
        const transactions = [
            { name: "IRCTC", date: "21 Mar, 2026", amt: "-₹450", type: "UPI", color: "bg-red-800" },
            { name: "Nimesh Machhi", date: "04 Mar, 2026", amt: "+₹1800", type: "UPI", color: "bg-red-500" },
            { name: "Nimesh Machhi", date: "09 Feb, 2026", amt: "+₹1200", type: "UPI", color: "bg-red-500" },
            { name: "GEC BHARUCH LIBRARY", date: "09 Feb, 2026", amt: "-₹500", type: "UPI", color: "bg-pink-500" },
            { name: "CASH TRANSFER", date: "07 Feb, 2026", amt: "+₹1,800", type: "BANK TRANSFER", color: "bg-purple-700" },
            { name: "Rohit mishra", date: "05 Feb, 2026", amt: "-₹1,000", type: "UPI", color: "bg-blue-600" },
            { name: "La'pinoz bharuch", date: "03 Feb, 2026", amt: "-₹300", type: "UPI", color: "bg-indigo-500" },
            { name: "Mc Donalds", date: "28 Jan, 2026", amt: "-₹410", type: "UPI", color: "bg-indigo-500" },
            { name: "Nimesh Machhi", date: "24 Jan, 2026", amt: "-₹3,000", type: "UPI", color: "bg-indigo-500" },
            { name: "La' pinoz Bharuch", date: "22 Jan, 2026", amt: "-₹300", type: "UPI", color: "bg-indigo-500" },
            { name: "Immortal Gym", date: "21 Jan, 2026", amt: "-₹3,000", type: "UPI", color: "bg-indigo-500" },
            { name: "Immortal Gym", date: "07 Jan, 2026", amt: "-₹3,000", type: "UPI", color: "bg-indigo-500" }
        ];

        const listContainer = document.getElementById('txn-list');

        listContainer.innerHTML = transactions.map(t => {
            const isCredit = t.amt.includes('+');
            return `
                <div class="flex justify-between items-center">
                    <div class="flex items-center space-x-4">
                        <div class="w-12 h-12 rounded-full ${t.color} text-white flex items-center justify-center font-bold text-lg">
                            ${t.name.charAt(0)}
                        </div>
                        <div>
                            <p class="font-bold text-sm text-gray-800">${t.name}</p>
                            <p class="text-[10px] text-gray-400 font-medium">${t.date}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-sm ${isCredit ? 'text-green-500' : 'text-red-500'}">
                            ${t.amt}
                        </p>
                        <p class="text-[8px] text-gray-400 font-bold uppercase tracking-tighter">${t.type}</p>
                    </div>
                </div>
            `;
        }).join('');
    </script>
</body>
</html>
