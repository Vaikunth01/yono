<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - YONO SBI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 max-w-md mx-auto flex flex-col h-screen overflow-hidden">
    
    <header class="bg-gradient-to-r from-purple-800 to-indigo-900 text-white p-6 pb-10">
        <div class="flex items-center mb-6">
            <a href="index.html"><i class="fas fa-arrow-left mr-4"></i></a>
            <h1 class="font-bold">Spending Analytics</h1>
        </div>
        <div class="bg-white/10 rounded-2xl p-4 flex justify-between items-center">
            <div>
                <p class="text-[10px] opacity-70 uppercase">Total Spent (April)</p>
                <p class="text-2xl font-bold">₹ 0</p>
            </div>
            <i class="fas fa-chart-pie text-3xl opacity-50"></i>
        </div>
    </header>

    <main class="flex-1 bg-white -mt-6 rounded-t-[30px] p-6 flex flex-col overflow-hidden">
        <h3 class="font-bold text-gray-800 mb-4">Transaction History</h3>
        
        <div class="overflow-y-auto space-y-6 pr-1 no-scrollbar pb-10">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-full bg-red-100 text-red-700 flex items-center justify-center font-bold">I</div>
                    <div><p class="font-bold text-sm">IRCTC</p><p class="text-[10px] text-gray-400">21 Mar, 2026</p></div>
                </div>
                <p class="font-bold text-red-500">-₹450</p>
            </div>

            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-full bg-green-100 text-green-700 flex items-center justify-center font-bold">N</div>
                    <div><p class="font-bold text-sm">Nimesh Machhi</p><p class="text-[10px] text-gray-400">04 Mar, 2026</p></div>
                </div>
                <p class="font-bold text-green-500">+₹1800</p>
            </div>

            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center font-bold">G</div>
                    <div><p class="font-bold text-sm">GEC BHARUCH...</p><p class="text-[10px] text-gray-400">09 Feb, 2026</p></div>
                </div>
                <p class="font-bold text-red-500">-₹500</p>
            </div>
        </div>
    </main>
</body>
</html>
