<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YONO SBI - Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .sbi-gradient {
            background: linear-gradient(180deg, #FFFFFF 0%, #a25cc4 50%, #6a329f 100%);
        }
        .key-active:active {
            transform: scale(0.92);
            background-color: #0d3147;
        }
        .dot {
            transition: all 0.2s ease-in-out;
        }
        .dot.filled {
            background-color: #2e1065;
            border-color: #2e1065;
            transform: scale(1.1);
        }
        .key-bg { background-color: #1a4f70; }
        .sbi-text-purple { color: #2e1065; }
    </style>
</head>
<body class="sbi-gradient min-h-screen flex flex-col items-center p-6">

    <header class="w-full flex flex-col items-center mt-4 mb-6">
        <div class="flex items-center space-x-1">
            <span class="text-3xl font-bold text-pink-600">yono</span>
            <div class="h-8 w-8 bg-cyan-500 rounded-full flex items-center justify-center text-white font-bold italic">SBI</div>
        </div>
        <p class="text-gray-500 text-[10px] uppercase tracking-widest mt-1">for every indian</p>
    </header>

    <main class="w-full max-w-sm bg-white rounded-[2.5rem] shadow-2xl p-8 flex flex-col items-center flex-grow mb-4">
        
        <div class="text-center mt-4">
            <h1 class="sbi-text-purple text-2xl font-bold mb-2">Enter MPIN</h1>
            <p class="text-gray-400 text-sm">Welcome back! Please enter your PIN</p>
        </div>

        <div class="flex space-x-4 my-12" id="pin-display">
            <div class="dot w-4 h-4 rounded-full border-2 border-gray-200"></div>
            <div class="dot w-4 h-4 rounded-full border-2 border-gray-200"></div>
            <div class="dot w-4 h-4 rounded-full border-2 border-gray-200"></div>
            <div class="dot w-4 h-4 rounded-full border-2 border-gray-200"></div>
            <div class="dot w-4 h-4 rounded-full border-2 border-gray-200"></div>
            <div class="dot w-4 h-4 rounded-full border-2 border-gray-200"></div>
        </div>

        <div class="grid grid-cols-3 gap-4 w-full max-w-[280px]">
            <button onclick="press('1')" class="key-bg key-active text-white text-2xl font-semibold py-5 rounded-2xl shadow-md transition-all">1</button>
            <button onclick="press('2')" class="key-bg key-active text-white text-2xl font-semibold py-5 rounded-2xl shadow-md transition-all">2</button>
            <button onclick="press('3')" class="key-bg key-active text-white text-2xl font-semibold py-5 rounded-2xl shadow-md transition-all">3</button>
            
            <button onclick="press('4')" class="key-bg key-active text-white text-2xl font-semibold py-5 rounded-2xl shadow-md transition-all">4</button>
            <button onclick="press('5')" class="key-bg key-active text-white text-2xl font-semibold py-5 rounded-2xl shadow-md transition-all">5</button>
            <button onclick="press('6')" class="key-bg key-active text-white text-2xl font-semibold py-5 rounded-2xl shadow-md transition-all">6</button>
            
            <button onclick="press('7')" class="key-bg key-active text-white text-2xl font-semibold py-5 rounded-2xl shadow-md transition-all">7</button>
            <button onclick="press('8')" class="key-bg key-active text-white text-2xl font-semibold py-5 rounded-2xl shadow-md transition-all">8</button>
            <button onclick="press('9')" class="key-bg key-active text-white text-2xl font-semibold py-5 rounded-2xl shadow-md transition-all">9</button>
            
            <button onclick="backspace()" class="flex items-center justify-center text-2xl sbi-text-purple hover:opacity-70 active:scale-90 transition-all">
                <i class="fa-solid fa-delete-left"></i>
            </button>
            <button onclick="press('0')" class="key-bg key-active text-white text-2xl font-semibold py-5 rounded-2xl shadow-md transition-all">0</button>
            <button id="submit-btn" class="flex items-center justify-center text-3xl text-gray-200 cursor-not-allowed transition-all duration-300">
                <i class="fa-solid fa-circle-arrow-right"></i>
            </button>
        </div>

        <div class="mt-auto pt-8">
            <a href="#" class="sbi-text-purple font-bold text-sm hover:underline">Forgot MPIN?</a>
        </div>
    </main>

    <script>
        let pin = "";
        const maxPin = 6;
        const dots = document.querySelectorAll('.dot');
        const submitBtn = document.getElementById('submit-btn');

        function press(num) {
            if (pin.length < maxPin) {
                pin += num;
                updateDots();
            }
        }

        function backspace() {
            pin = pin.slice(0, -1);
            updateDots();
        }

        function updateDots() {
            dots.forEach((dot, i) => {
                if (i < pin.length) {
                    dot.classList.add('filled');
                } else {
                    dot.classList.remove('filled');
                }
            });

            // Logic for Submit Button
            if (pin.length === maxPin) {
                submitBtn.classList.remove('text-gray-200', 'cursor-not-allowed');
                submitBtn.classList.add('text-pink-600', 'cursor-pointer', 'scale-110');
                // Auto-submit simulation
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 400);
            } else {
                submitBtn.classList.add('text-gray-200', 'cursor-not-allowed');
                submitBtn.classList.remove('text-pink-600', 'cursor-pointer', 'scale-110');
            }
        }
    </script>
</body>
</html>
