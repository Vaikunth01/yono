<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Accounts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-blue-50/30 max-w-md mx-auto min-h-screen">
    <div class="bg-white p-6 rounded-b-[40px] shadow-sm">
        <div class="flex items-center mb-6">
            <a href="dashboard.html"><i class="fas fa-arrow-left text-xl mr-4"></i></a>
            <h1 class="text-xl font-bold">My Accounts</h1>
        </div>
        
        <div class="bg-gradient-to-r from-blue-700 to-blue-500 rounded-2xl p-6 text-white">
            <p class="text-xs opacity-80 mb-1">Total Balance</p>
            <h2 class="text-2xl font-bold mb-4">₹ 5,090.67</h2>
            <div class="h-[1px] bg-white/20 w-full mb-4"></div>
            <p class="text-xs">Savings Account: xxxxxxx269</p>
        </div>
    </div>

    <div class="p-6 space-y-4">
        <h3 class="font-bold text-gray-700">Other Accounts</h3>
        <div class="bg-white p-4 rounded-xl flex items-center space-x-4 border border-gray-100">
            <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center text-green-600"><i class="fas fa-lock"></i></div>
            <div>
                <p class="font-bold text-sm">Fixed Deposits</p>
                <p class="text-xs text-gray-400">View your active FDs</p>
            </div>
        </div>
    </div>
