<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YONO Pay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 max-w-md mx-auto p-6">
    <header class="flex items-center mb-8">
        <a href="dashboard.html"><i class="fas fa-arrow-left text-xl mr-4"></i></a>
        <h1 class="text-xl font-bold">YONO Pay</h1>
    </header>

    <div class="grid grid-cols-2 gap-4">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center">
            <i class="fas fa-qrcode text-3xl text-purple-600 mb-3"></i>
            <span class="text-sm font-bold">Scan & Pay</span>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center">
            <i class="fas fa-user-friends text-3xl text-blue-600 mb-3"></i>
            <span class="text-sm font-bold">To Contact</span>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center">
            <i class="fas fa-university text-3xl text-green-600 mb-3"></i>
            <span class="text-sm font-bold">Bank Transfer</span>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center">
            <i class="fas fa-mobile-alt text-3xl text-orange-600 mb-3"></i>
            <span class="text-sm font-bold">Self Transfer</span>
        </div>
    </div>
</body>
</html>
