<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YONO SBI - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; }
        .sbi-gradient {
            background: linear-gradient(180deg, #FFFFFF 0%, #a25cc4 50%, #6a329f 100%);
        }
        .sbi-purple-btn { background-color: #6a329f; }
        .sbi-text-purple { color: #2e1065; }
        .sbi-link { color: #512da8; }
    </style>
</head>
<body class="sbi-gradient min-h-screen flex flex-col items-center p-6">

    <header class="w-full flex flex-col items-center mt-6 mb-8">
        <div class="flex items-center space-x-1">
            <span class="text-3xl font-bold text-pink-600">yono</span>
            <div class="h-8 w-8 bg-cyan-500 rounded-full flex items-center justify-center text-white font-bold italic">SBI</div>
        </div>
        <p class="text-gray-600 text-xs mt-1">for every <span class="text-orange-500">indi</span><span class="text-green-600">an</span></p>
    </header>

    <main class="w-full max-w-sm bg-white rounded-2xl shadow-2xl p-8 flex flex-col min-h-[600px]">
        
        <h1 class="sbi-text-purple text-2xl font-bold text-center mt-4 mb-10">
            Login using user name
        </h1>

        <form class="space-y-6 flex-grow">
            <div class="space-y-2">
                <label class="text-gray-700 font-medium ml-1">User name</label>
                <input type="text" 
                       placeholder="Enter your user name" 
                       class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-purple-400 placeholder-gray-400">
            </div>

            <div class="space-y-2">
                <label class="text-gray-700 font-medium ml-1">Password</label>
                <div class="relative">
                    <input type="password" 
                           placeholder="Enter your password" 
                           class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-purple-400 placeholder-gray-400">
                    <button type="button" class="absolute right-3 top-3.5 text-gray-500">
                        <i class="fa-regular fa-eye-slash"></i>
                    </button>
                </div>
            </div>

            <div class="text-right">
                <a href="#" class="sbi-link text-sm font-semibold underline underline-offset-2">
                    Forgot Password?
                </a>
            </div>

            <button type="submit" class="w-full sbi-purple-btn text-white font-bold py-4 rounded-xl shadow-lg mt-4 active:scale-95 transition">
                Login
            </button>

            <p class="text-center text-gray-600 text-sm mt-4">
                Don't have account? <a href="#" class="font-bold text-black">Create now</a>
            </p>
        </form>

        <div class="mt-auto pt-10 text-center">
            <a href="mpin.html" class="sbi-text-purple font-bold text-lg">
                Login using MPIN
            </a>
        </div>
    </main>

</body>
</html>
